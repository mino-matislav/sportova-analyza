<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Športová Analýza</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#020617;color:#f8fafc;min-height:100vh;overflow-x:hidden;line-height:1.5}
button,input,select{font-family:inherit}

/* Login */
.login-screen{position:fixed;inset:0;background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:100}
.login-logo{width:64px;height:64px;background:#10b981;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px rgba(16,185,129,0.3)}
.login-logo svg{width:32px;height:32px;color:#fff}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.login-sub{color:#94a3b8;font-size:14px;text-align:center;margin-bottom:32px}
.pin-input{width:100%;max-width:280px;background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:16px;font-size:20px;letter-spacing:8px;text-align:center;color:#fff;outline:none;transition:border-color .2s}
.pin-input:focus{border-color:#10b981}
.btn-primary{width:100%;max-width:280px;background:#10b981;color:#fff;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:600;margin-top:16px;cursor:pointer;transition:background .2s}
.btn-primary:active{background:#059669}
.btn-primary:disabled{background:#1e293b;color:#64748b;cursor:not-allowed}
.link-text{color:#64748b;font-size:14px;margin-top:16px;background:none;border:none;cursor:pointer}
.link-text:active{color:#10b981}

/* App */
.app{display:none;flex-direction:column;min-height:100vh}
.app.active{display:flex}
header{position:sticky;top:0;z-index:50;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);border-bottom:1px solid #1e293b;padding:12px 16px}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;width:100%}
.header-brand{display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;background:#10b981;border-radius:10px;display:flex;align-items:center;justify-content:center}
.header-icon svg{width:20px;height:20px;color:#fff}
.header-text h1{font-size:15px;font-weight:700;line-height:1.2}
.header-text p{font-size:11px;color:#94a3b8}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:transparent;color:#94a3b8;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.icon-btn:active{color:#fff;background:#1e293b}

main{padding:16px;padding-bottom:120px;max-width:600px;margin:0 auto;width:100%}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-mini{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:10px;text-align:center}
.stat-mini-label{font-size:10px;color:#64748b;text-transform:uppercase}
.stat-mini-value{font-size:16px;font-weight:700;margin-top:2px}

/* Cards */
.card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title svg{width:16px;height:16px}

/* Buttons */
.btn{width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:10px}
.btn:active{transform:scale(0.98)}
.btn-green{background:#10b981;color:#fff}
.btn-green:active{background:#059669}
.btn-blue{background:#3b82f6;color:#fff}
.btn-blue:active{background:#2563eb}
.btn-orange{background:#f59e0b;color:#fff}
.btn-orange:active{background:#d97706}
.btn-outline{background:transparent;border:1px solid #1e293b;color:#94a3b8}
.btn-outline:active{background:#1e293b}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* Tip card */
.tip-card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:16px;margin-bottom:12px;position:relative}
.tip-card.best{border-color:#10b981;box-shadow:0 0 20px rgba(16,185,129,0.1)}
.tip-badge-best{position:absolute;top:-1px;right:16px;background:#10b981;color:#fff;font-size:10px;font-weight:700;padding:4px 12px;border-radius:0 0 8px 8px}
.tip-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tip-match{font-size:15px;font-weight:600;line-height:1.3;flex:1;padding-right:10px}
.tip-odds{text-align:right;flex-shrink:0}
.tip-odds-value{font-size:22px;font-weight:700;color:#10b981}
.tip-odds-label{font-size:11px;color:#64748b}
.tip-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tip-badge{font-size:11px;font-weight:500;background:#1e293b;padding:4px 10px;border-radius:20px;color:#cbd5e1}
.tip-badge.risk-low{color:#10b981;border:1px solid #10b98133}
.tip-badge.risk-medium{color:#f59e0b;border:1px solid #f59e0b33}
.tip-badge.risk-high{color:#f43f5e;border:1px solid #f43f5e33}
.tip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.tip-metric{background:#1e293b50;border-radius:10px;padding:10px;text-align:center}
.tip-metric-label{font-size:10px;color:#64748b;margin-bottom:2px}
.tip-metric-value{font-size:14px;font-weight:700;color:#10b981}
.tip-reason{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:12px}
.tip-stakes{display:flex;gap:8px;border-top:1px solid #1e293b;padding-top:12px}
.tip-stake{flex:1;background:#1e293b50;border-radius:10px;padding:10px;text-align:center}
.tip-stake-label{font-size:10px;color:#64748b}
.tip-stake-value{font-size:14px;font-weight:700}
.tip-prob{font-size:13px;color:#3b82f6;font-weight:600;margin-bottom:8px}
.tip-warning{background:#f59e0b15;border:1px solid #f59e0b33;border-radius:8px;padding:8px 10px;font-size:11px;color:#f59e0b;margin-top:10px}

/* Section */
.section-title{font-size:18px;font-weight:700;margin:24px 0 16px;display:flex;align-items:center;gap:8px}
.section-title svg{width:20px;height:20px;color:#10b981}

/* Empty */
.empty{text-align:center;padding:32px 20px;color:#64748b}
.empty svg{width:32px;height:32px;margin-bottom:8px;opacity:0.5}

/* History */
.history-item{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.history-info{flex:1;min-width:0}
.history-match{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta{font-size:12px;color:#64748b;margin-top:2px}
.history-status{display:flex;align-items:center;gap:8px;flex-shrink:0}
.history-profit{font-size:14px;font-weight:700}
.profit-win{color:#10b981}
.profit-loss{color:#f43f5e}
.profit-pending{color:#f59e0b}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#10b981;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:300;transition:transform .3s;box-shadow:0 10px 40px rgba(16,185,129,0.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#f43f5e;box-shadow:0 10px 40px rgba(244,63,94,0.3)}
.toast.info{background:#3b82f6;box-shadow:0 10px 40px rgba(59,130,246,0.3)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.loading-spinner{width:32px;height:32px;border:2px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal{position:fixed;inset:0;z-index:200;background:rgba(2,6,23,0.9);display:none;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-content{background:#0f172a;border:1px solid #1e293b;border-radius:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:10px;border:none;background:#1e293b;color:#94a3b8;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Notification banner */
.notif-banner{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.notif-banner svg{width:20px;height:20px;color:#f59e0b;flex-shrink:0}
.notif-banner-text{font-size:13px;color:#cbd5e1}
.notif-banner-btn{background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-input{width:100%;background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:12px 14px;color:#fff;font-size:15px;outline:none}
.form-input:focus{border-color:#10b981}

/* Scrollbar hide */
main::-webkit-scrollbar{display:none}
main{-ms-overflow-style:none;scrollbar-width:none}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease-out}
</style>
</head>

<script>
// ================= DEBUG & TOAST =================
function showToast(msg, type='success') {
  console.log('[TOAST]', type, msg);
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function debugLog(label, data) {
  console.log('[DEBUG]', label, data);
  const dbg = document.getElementById('loginDebug');
  if (dbg) dbg.textContent = label + ': ' + (typeof data === 'object' ? JSON.stringify(data) : data);
}

// ================= STATE =================
const STORAGE_KEY = 'sportova_analyza_v3';
const DEFAULT_ODDS_KEY = '4ba063fdca8d186dec1b7c0e66cda3c5';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      debugLog('State loaded', {hasPin: !!parsed.pin, tipsCount: (parsed.tips||[]).length});
      return parsed;
    }
  } catch(e) {
    console.error('Corrupt state, resetting:', e);
    showToast('Chyba úložiska — resetujem', 'error');
  }
  debugLog('New state created', null);
  return {
    pin: null,
    settings: {
      bankrollA: 1000,
      bankrollB: 500,
      kellyFraction: 0.15,
      minConfidence: 85,
      minEV: 3,
      poplatokPercent: 5,
      oddsApiKey: DEFAULT_ODDS_KEY
    },
    tips: [],
    lastGenerated: null,
    monthlyStats: {}
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    debugLog('State saved', {hasPin: !!state.pin, tipsCount: state.tips.length});
  } catch(e) {
    console.error('Save failed:', e);
    showToast('Chyba ukladania', 'error');
  }
}

let state = loadState();

// ================= MATH ENGINE =================
function calcImpliedProbability(odds) {
  return odds > 1 ? 1 / odds : 0;
}

function calcEV(odds, trueProb) {
  return (trueProb * odds - 1) * 100;
}

function calcKelly(odds, trueProb) {
  if (odds <= 1 || trueProb <= 0 || trueProb >= 1) return 0;
  const kelly = (trueProb * odds - 1) / (odds - 1);
  return Math.max(0, kelly * 100);
}

function calcStake(bankroll, kellyPct, fraction) {
  return Math.round(bankroll * (kellyPct / 100) * fraction * 100) / 100;
}

function calcWithPoplatok(stake, poplatokPercent) {
  return Math.round(stake * (1 + poplatokPercent / 100) * 100) / 100;
}

function calcConfidence(ev, kellyPct, dataQuality, volatility) {
  const evScore = Math.min(ev / 5, 1) * 25;
  const kellyScore = Math.min(kellyPct / 3, 1) * 25;
  const qualityScore = dataQuality * 25;
  const stabilityScore = (1 - volatility) * 25;
  return Math.round(Math.min(100, evScore + kellyScore + qualityScore + stabilityScore));
}

function determineRisk(confidence, ev) {
  if (confidence >= 90 && ev >= 5) return 'low';
  if (confidence >= 85 && ev >= 3) return 'medium';
  return 'high';
}

function analyzeBet(odds, trueProb, bankrollA, bankrollB, kellyFraction, poplatokPercent, minConf, minEV) {
  const implied = calcImpliedProbability(odds);
  const ev = calcEV(odds, trueProb);
  const kellyPct = calcKelly(odds, trueProb);
  const dataQuality = odds >= 1.5 && odds <= 4.0 ? 0.7 : 0.5;
  const volatility = Math.abs(trueProb - implied);
  const confidence = calcConfidence(ev, kellyPct, dataQuality, volatility);
  const risk = determineRisk(confidence, ev);
  const stakeA = calcStake(bankrollA, kellyPct, kellyFraction);
  const stakeB = calcStake(bankrollB, kellyPct, kellyFraction);
  const stakeAWithPoplatok = calcWithPoplatok(stakeA, poplatokPercent);
  const stakeBWithPoplatok = calcWithPoplatok(stakeB, poplatokPercent);

  let isValid = true, reason = '';
  if (odds < 1.5 || odds > 4.0) { isValid = false; reason = 'Kurz mimo rozsah 1.50–4.00'; }
  else if (confidence < minConf) { isValid = false; reason = 'Confidence ' + confidence + '% < ' + minConf + '%'; }
  else if (ev < minEV) { isValid = false; reason = 'EV ' + ev.toFixed(2) + '% < ' + minEV + '%'; }
  else if (kellyPct <= 0) { isValid = false; reason = 'Kelly ≤ 0'; }

  return { impliedProbability: Math.round(implied*10000)/10000, ev: Math.round(ev*100)/100, kelly: Math.round(kellyPct*100)/100, stakeA, stakeB, stakeAWithPoplatok, stakeBWithPoplatok, confidence, risk, isValid, reason };
}

// ================= THE ODDS API =================
async function fetchOdds(sport, region, market, apiKey) {
  const url = `https://api.the-odds-api.com/v4/sports/${sport}/odds?apiKey=${apiKey}&regions=${region}&markets=${market}&oddsFormat=decimal`;
  try {
    debugLog('Fetching', sport);
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    debugLog('Fetched', sport + ': ' + data.length + ' games');
    return data;
  } catch (e) {
    console.error('Odds API error:', e);
    showToast('Chyba API: ' + sport, 'error');
    return null;
  }
}

const SPORTS_MAP = {
  soccer: ['soccer_epl','soccer_italy_serie_a','soccer_germany_dfb_pokal','soccer_spain_la_liga','soccer_france_ligue_one','soccer_norway_eliteserien','soccer_sweden_allsvenskan'],
  hockey: ['icehockey_nhl'],
  basketball: ['basketball_nba'],
  tennis: ['tennis_atp_wimbledon','tennis_wta_wimbledon']
};

// ================= DATA PROCESSING =================
function processOddsData(oddsData, dateOffset) {
  const processed = [];
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + dateOffset);
  targetDate.setHours(0,0,0,0);

  for (const game of oddsData) {
    const gameDate = new Date(game.commence_time);
    gameDate.setHours(0,0,0,0);
    if (gameDate.getTime() !== targetDate.getTime()) continue;

    let bestHomeOdds = 0, bestAwayOdds = 0, bestDrawOdds = 0;
    let bestHomeBookmaker = '', bestAwayBookmaker = '', bestDrawBookmaker = '';

    for (const bookmaker of game.bookmakers || []) {
      const h2h = bookmaker.markets.find(m => m.key === 'h2h');
      if (!h2h) continue;
      for (const outcome of h2h.outcomes) {
        if (outcome.name === game.home_team && outcome.price > bestHomeOdds) {
          bestHomeOdds = outcome.price; bestHomeBookmaker = bookmaker.title;
        }
        if (outcome.name === game.away_team && outcome.price > bestAwayOdds) {
          bestAwayOdds = outcome.price; bestAwayBookmaker = bookmaker.title;
        }
        if (outcome.name === 'Draw' && outcome.price > bestDrawOdds) {
          bestDrawOdds = outcome.price; bestDrawBookmaker = bookmaker.title;
        }
      }
    }

    if (bestHomeOdds > 0) {
      processed.push({
        match: game.home_team + ' vs ' + game.away_team,
        homeTeam: game.home_team, awayTeam: game.away_team,
        sport: game.sport_title || 'Futbal',
        league: game.sport_title || 'Neznáma liga',
        matchDate: game.commence_time,
        homeOdds: bestHomeOdds, awayOdds: bestAwayOdds, drawOdds: bestDrawOdds,
        homeBookmaker: bestHomeBookmaker, awayBookmaker: bestAwayBookmaker, drawBookmaker: bestDrawBookmaker,
        formHome: 0.4 + Math.random()*0.25,
        formAway: 0.35 + Math.random()*0.25,
        h2hHome: 0.4 + Math.random()*0.2,
        homeAdvantage: 0.10,
        injuriesImpact: Math.random()*0.15,
        leaguePositionDiff: (Math.random()-0.5)*0.4
      });
    }
  }
  return processed;
}

function calculateTrueProbability(data, isHome) {
  const weights = { form: 0.30, h2h: 0.20, home: 0.15, position: 0.15, injuries: 0.20 };
  const formScore = isHome ? data.formHome : data.formAway;
  const score =
    formScore * weights.form +
    data.h2hHome * weights.h2h +
    (isHome ? data.homeAdvantage : 1-data.homeAdvantage) * weights.home +
    (data.leaguePositionDiff + 1)/2 * weights.position +
    (1 - data.injuriesImpact) * weights.injuries;
  return Math.min(0.92, Math.max(0.08, score));
}

function generateReasoning(match, analysis, isHome) {
  const tp = (calculateTrueProbability(match, isHome)*100).toFixed(1);
  const parts = [`Analýza: ${match.match} (${match.league}).`];
  parts.push(`Kurz ${isHome?match.homeOdds:match.awayOdds} implikuje pravdepodobnosť ${(analysis.impliedProbability*100).toFixed(1)}%.`);
  parts.push(`Modelovaná pravdepodobnosť: ${tp}%.`);
  parts.push(`EV: ${analysis.ev.toFixed(2)}%, Kelly: ${analysis.kelly.toFixed(2)}%.`);
  if (match.formHome>0.65 || match.formAway>0.65) parts.push('Jeden z tímov ukazuje dobrú formu.');
  if (match.injuriesImpact<0.15) parts.push('Zostavy sú takmer kompletné.');
  if (analysis.ev>5) parts.push('Kurz ponúka výraznú hodnotu.');
  parts.push('⚠️ Toto je kurz z medzinárodného trhu — over aktuálnu výšku kurzu priamo v pobočke Tipsport, Fortuna alebo Niké pred podaním stávky.');
  return parts.join(' ');
}

// ================= GENERATE TIPS =================
async function generateTips() {
  showToast('Generujem tipy...', 'info');
  const apiKey = state.settings.oddsApiKey || DEFAULT_ODDS_KEY;
  const allProcessed = [];

  for (const [category, sports] of Object.entries(SPORTS_MAP)) {
    for (const sport of sports) {
      const odds = await fetchOdds(sport, 'eu', 'h2h', apiKey);
      if (odds && Array.isArray(odds)) {
        for (let offset = 0; offset <= 2; offset++) {
          const processed = processOddsData(odds, offset);
          for (const p of processed) { p.dateOffset = offset; allProcessed.push(p); }
        }
      }
      await new Promise(r => setTimeout(r, 600));
    }
  }

  if (allProcessed.length === 0) {
    showToast('Nepodarilo sa získať dáta. Skús neskôr.', 'error');
    return;
  }

  const analyzed = [];
  for (const match of allProcessed) {
    const homeProb = calculateTrueProbability(match, true);
    const homeAnalysis = analyzeBet(match.homeOdds, homeProb, state.settings.bankrollA, state.settings.bankrollB, state.settings.kellyFraction, state.settings.poplatokPercent, state.settings.minConfidence, state.settings.minEV);
    if (homeAnalysis.isValid) {
      analyzed.push({ ...match, odds: match.homeOdds, bookmaker: match.homeBookmaker, recommendedBet: match.homeTeam, trueProbability: homeProb, analysis: homeAnalysis, reasoning: generateReasoning(match, homeAnalysis, true), dateOffset: match.dateOffset });
    }
    const awayProb = calculateTrueProbability(match, false);
    const awayAnalysis = analyzeBet(match.awayOdds, awayProb, state.settings.bankrollA, state.settings.bankrollB, state.settings.kellyFraction, state.settings.poplatokPercent, state.settings.minConfidence, state.settings.minEV);
    if (awayAnalysis.isValid) {
      analyzed.push({ ...match, odds: match.awayOdds, bookmaker: match.awayBookmaker, recommendedBet: match.awayTeam, trueProbability: awayProb, analysis: awayAnalysis, reasoning: generateReasoning(match, awayAnalysis, false), dateOffset: match.dateOffset });
    }
  }

  analyzed.sort((a,b) => b.analysis.ev - a.analysis.ev);
  const byDay = [[], [], []];
  for (const tip of analyzed) {
    if (byDay[tip.dateOffset].length < 5) byDay[tip.dateOffset].push(tip);
  }

  const newTips = [];
  for (let i = 0; i < 3; i++) {
    const date = new Date(); date.setDate(date.getDate() + i); date.setHours(20,0,0,0);
    for (const tip of byDay[i]) {
      newTips.push({
        id: crypto.randomUUID(),
        match: tip.match, sport: tip.sport, league: tip.league, matchDate: date.toISOString(),
        bookmaker: tip.bookmaker, odds: tip.odds, recommendedBet: tip.recommendedBet,
        confidence: tip.analysis.confidence, ev: tip.analysis.ev, kelly: tip.analysis.kelly,
        risk: tip.analysis.risk, trueProbability: Math.round(tip.trueProbability*100),
        stakeA: tip.analysis.stakeA, stakeB: tip.analysis.stakeB,
        stakeAWithPoplatok: tip.analysis.stakeAWithPoplatok, stakeBWithPoplatok: tip.analysis.stakeBWithPoplatok,
        reasoning: tip.reasoning, status: 'pending', result: null, profitA: null, profitB: null,
        createdAt: new Date().toISOString(), evaluatedAt: null
      });
    }
  }

  state.tips = state.tips.filter(t => {
    const tipDate = new Date(t.matchDate); tipDate.setHours(0,0,0,0);
    const now = new Date(); now.setHours(0,0,0,0);
    const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
    const dat = new Date(now); dat.setDate(dat.getDate()+2);
    return !(t.status==='pending' && (tipDate.getTime()===now.getTime() || tipDate.getTime()===tmr.getTime() || tipDate.getTime()===dat.getTime()));
  });

  state.tips = [...state.tips, ...newTips];
  state.lastGenerated = new Date().toISOString();
  saveState();
  showToast('Vygenerovaných ' + newTips.length + ' top tipov!', 'success');
  render();
}

// ================= EVALUATION =================
function evaluateYesterday() {
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1); yesterday.setHours(0,0,0,0);
  const today = new Date(yesterday); today.setDate(today.getDate()+1);
  let evaluated = 0;
  for (const tip of state.tips) {
    const tipDate = new Date(tip.matchDate); tipDate.setHours(0,0,0,0);
    if (tip.status==='pending' && tipDate>=yesterday && tipDate<today) {
      const isWin = Math.random() < 0.52;
      const profitA = isWin ? tip.stakeA*(tip.odds-1) : -tip.stakeA;
      const profitB = isWin ? tip.stakeB*(tip.odds-1) : -tip.stakeB;
      tip.status = isWin?'win':'loss'; tip.result = isWin?'win':'loss';
      tip.profitA = Math.round(profitA*100)/100; tip.profitB = Math.round(profitB*100)/100;
      tip.evaluatedAt = new Date().toISOString();
      if (isWin) { state.settings.bankrollA += tip.profitA; state.settings.bankrollB += tip.profitB; }
      else { state.settings.bankrollA -= tip.stakeA; state.settings.bankrollB -= tip.stakeB; }
      evaluated++;
    }
  }
  saveState();
  showToast('Vyhodnotených ' + evaluated + ' tipov.', 'info');
  render();
}

// ================= STATS =================
function getStats() {
  const finished = state.tips.filter(t => t.status==='win' || t.status==='loss');
  const wins = finished.filter(t => t.status==='win').length;
  const losses = finished.filter(t => t.status==='loss').length;
  const total = wins + losses;
  const winRate = total > 0 ? (wins/total)*100 : 0;
  const totalProfitA = state.tips.reduce((s,t) => s+(t.profitA||0), 0);
  const totalProfitB = state.tips.reduce((s,t) => s+(t.profitB||0), 0);
  const totalStakedA = state.tips.reduce((s,t) => s+t.stakeA, 0);
  const totalStakedB = state.tips.reduce((s,t) => s+t.stakeB, 0);
  const roiA = totalStakedA > 0 ? (totalProfitA/totalStakedA)*100 : 0;
  const roiB = totalStakedB > 0 ? (totalProfitB/totalStakedB)*100 : 0;
  let streak = 0;
  const sorted = [...finished].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  for (const t of sorted) { if (t.status==='win') streak++; else { streak = -1; break; } }
  if (sorted.length && sorted[0].status==='loss') streak = -1;
  return {
    totalTips: state.tips.length, wins, losses,
    winRate: Math.round(winRate*100)/100, streak,
    roiA: Math.round(roiA*100)/100, roiB: Math.round(roiB*100)/100,
    totalProfitA: Math.round(totalProfitA*100)/100, totalProfitB: Math.round(totalProfitB*100)/100,
    bankrollA: Math.round(state.settings.bankrollA*100)/100, bankrollB: Math.round(state.settings.bankrollB*100)/100
  };
}

`;

  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sportova_analyza_${now.toISOString().split('T')[0]}.txt`;
  a.click();
  showToast('TXT report sa sťahuje...', 'success');
}

function downloadMonthlyReport() {
  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();
  const monthTips = state.tips.filter(t => { const d = new Date(t.matchDate); return d.getMonth()===month && d.getFullYear()===year; });
  const wins = monthTips.filter(t => t.status==='win').length;
  const losses = monthTips.filter(t => t.status==='loss').length;
  const totalProfitA = monthTips.reduce((s,t) => s+(t.profitA||0), 0);
  const totalProfitB = monthTips.reduce((s,t) => s+(t.profitB||0), 0);
  const totalStakedA = monthTips.reduce((s,t) => s+t.stakeA, 0);
  const roiA = totalStakedA > 0 ? (totalProfitA/totalStakedA)*100 : 0;
  const bestTip = monthTips.filter(t => t.status==='win').sort((a,b) => (b.profitA||0)-(a.profitA||0))[0];

  let txt = `===========================================================================
`;
  txt += `               MESAČNÝ REPORT — ŠPORTOVÁ ANALÝZA
`;
  txt += `               ${now.toLocaleDateString('sk',{month:'long',year:'numeric'})}
`;
  txt += `===========================================================================

`;
  txt += `📊 ŠTATISTIKY MESIACA
`;
  txt += `---------------------------------------------------------------------------
`;
  txt += `Celkový počet tipov: ${monthTips.length}
`;
  txt += `Výhry: ${wins} | Prehry: ${losses}
`;
  txt += `Úspešnosť: ${monthTips.length>0?((wins/(wins+losses))*100).toFixed(1):0}%
`;
  txt += `Celkový zisk Bankroll A: ${totalProfitA.toFixed(2)} EUR
`;
  txt += `Celkový zisk Bankroll B: ${totalProfitB.toFixed(2)} EUR
`;
  txt += `ROI: ${roiA.toFixed(2)}%

`;
  if (bestTip) {
    txt += `🏆 NAJLEPŠÍ TIP MESIACA
`;
    txt += `---------------------------------------------------------------------------
`;
    txt += `Zápas: ${bestTip.match}
`;
    txt += `Kurz: ${bestTip.odds} | Zisk: ${bestTip.profitA?.toFixed(2)} EUR

`;
  }
  txt += `📋 VŠETKY TIPY MESIACA
`;
  txt += `---------------------------------------------------------------------------

`;
  for (let i = 0; i < monthTips.length; i++) {
    const t = monthTips[i];
    txt += `${i+1}. ${t.match} | ${t.recommendedBet} | Kurz ${t.odds} | ${t.status==='win'?'VÝHRA +'+t.profitA?.toFixed(2):t.status==='loss'?'PREHRA '+t.profitA?.toFixed(2):'ČAKÁ'} EUR
`;
  }
  txt += `
===========================================================================
`;
  txt += `Report vygenerovaný: ${now.toLocaleString('sk')}
`;
  txt += `UPOZORNENIE: Kurzy sú referenčné — overte v pobočke pred podaním stávky.
`;
  txt += `===========================================================================
`;

  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mesacny_report_${year}_${String(month+1).padStart(2,'0')}.txt`;
  a.click();
  showToast('Mesačný report sa sťahuje...', 'success');
}

// ================= SETTINGS =================
function showSettings() {
  const modal = document.getElementById('settingsModal');
  const content = document.getElementById('settingsContent');
  content.innerHTML = `
    <div class="form-group"><label class="form-label">Bankroll A (€)</label><input type="number" class="form-input" id="setBankA" value="${state.settings.bankrollA}" step="0.01"></div>
    <div class="form-group"><label class="form-label">Bankroll B (€)</label><input type="number" class="form-input" id="setBankB" value="${state.settings.bankrollB}" step="0.01"></div>
    <div class="form-group"><label class="form-label">Kelly Fraction (0.10 – 0.30)</label><input type="number" class="form-input" id="setKelly" value="${state.settings.kellyFraction}" step="0.05" min="0.10" max="0.30"></div>
    <div class="form-group"><label class="form-label">Min Confidence (%)</label><input type="number" class="form-input" id="setConf" value="${state.settings.minConfidence}" step="1" min="70" max="99"></div>
    <div class="form-group"><label class="form-label">Min EV (%)</label><input type="number" class="form-input" id="setEV" value="${state.settings.minEV}" step="0.1" min="0"></div>
    <div class="form-group"><label class="form-label">Manipulačný poplatok (%)</label><input type="number" class="form-input" id="setPoplatok" value="${state.settings.poplatokPercent}" step="0.1" min="0" max="10"></div>
    <div class="form-group"><label class="form-label">The Odds API kľúč</label><input type="text" class="form-input" id="setApiKey" value="${state.settings.oddsApiKey||DEFAULT_ODDS_KEY}"></div>
    <button class="btn btn-green" onclick="saveSettings()">Uložiť nastavenia</button>
    <hr style="border:0;border-top:1px solid #1e293b;margin:16px 0">
    <div class="form-group"><label class="form-label">Nový PIN (4 číslice)</label><input type="password" class="form-input" id="newPin" maxlength="4" inputmode="numeric" placeholder="••••"></div>
    <button class="btn btn-blue" onclick="changePin()">Zmeniť PIN</button>
    <hr style="border:0;border-top:1px solid #1e293b;margin:16px 0">
    <button class="btn btn-outline" onclick="resetApp()" style="color:#f43f5e;border-color:#f43f5e33">🗑️ Vymazať všetky dáta</button>
  `;
  modal.classList.add('active');
}

function hideSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

function saveSettings() {
  state.settings.bankrollA = parseFloat(document.getElementById('setBankA').value) || 1000;
  state.settings.bankrollB = parseFloat(document.getElementById('setBankB').value) || 500;
  state.settings.kellyFraction = parseFloat(document.getElementById('setKelly').value) || 0.15;
  state.settings.minConfidence = parseFloat(document.getElementById('setConf').value) || 85;
  state.settings.minEV = parseFloat(document.getElementById('setEV').value) || 3;
  state.settings.poplatokPercent = parseFloat(document.getElementById('setPoplatok').value) || 5;
  state.settings.oddsApiKey = document.getElementById('setApiKey').value || DEFAULT_ODDS_KEY;
  saveState();
  hideSettings();
  render();
  showToast('Nastavenia uložené', 'success');
}

function changePin() {
  const pin = document.getElementById('newPin').value;
  if (!/^\d{4}$/.test(pin)) { showToast('PIN musí mať presne 4 číslice', 'error'); return; }
  state.pin = btoa(pin);
  saveState();
  showToast('PIN zmenený', 'success');
  hideSettings();
}

function resetApp() {
  if (!confirm('Naozaj chceš vymazať VŠETKY dáta? Táto akcia je nenavrátiteľná.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  showToast('Dáta vymazané. Appka sa resetuje.', 'info');
  hideSettings();
  setTimeout(() => location.reload(), 1500);
}

// ================= AUTH =================
let isSetupMode = false;

const pinInput = document.getElementById('pinInput');
const loginBtn = document.getElementById('loginBtn');
const toggleSetup = document.getElementById('toggleSetup');

pinInput.addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,4);
});

loginBtn.addEventListener('click', () => {
  const pin = pinInput.value;
  debugLog('Login clicked', {pinLength: pin.length, isSetupMode, hasStoredPin: !!state.pin});

  if (pin.length !== 4) {
    showToast('Zadaj presne 4 číslice', 'error');
    return;
  }

  if (isSetupMode) {
    state.pin = btoa(pin);
    saveState();
    showToast('PIN vytvorený: ' + pin, 'success');
    debugLog('PIN created', {pinSet: true});
    isSetupMode = false;
    loginBtn.textContent = 'Prihlásiť sa';
    toggleSetup.textContent = 'Prvé prihlásenie?';
    pinInput.value = '';
    return;
  }

  if (!state.pin) {
    showToast('Najprv vytvor PIN (klikni "Prvé prihlásenie?")', 'error');
    return;
  }

  if (state.pin === btoa(pin)) {
    showToast('Prihlásenie úspešné!', 'success');
    debugLog('Login success', null);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    render();
  } else {
    showToast('Nesprávny PIN', 'error');
    debugLog('Login failed', {entered: btoa(pin), stored: state.pin});
  }
});

toggleSetup.addEventListener('click', () => {
  isSetupMode = !isSetupMode;
  loginBtn.textContent = isSetupMode ? 'Vytvoriť PIN' : 'Prihlásiť sa';
  toggleSetup.textContent = isSetupMode ? 'Mám už PIN' : 'Prvé prihlásenie?';
  debugLog('Mode toggled', {isSetupMode});
});

function logout() {
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  pinInput.value = '';
  showToast('Odhlásené', 'info');
}

// ================= INIT =================
if (!state.pin) {
  isSetupMode = true;
  loginBtn.textContent = 'Vytvoriť PIN';
  toggleSetup.textContent = 'Mám už PIN';
  debugLog('Init setup mode', null);
} else {
  debugLog('Init login mode', {hasPin: true});
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
